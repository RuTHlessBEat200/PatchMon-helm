{{- if .Values.server.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "patchmon.fullname" . }}-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "patchmon.server.labels" . | nindent 4 }}
  {{- if or .Values.server.service.annotations .Values.commonAnnotations }}
  annotations:
    {{- with .Values.server.service.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.commonAnnotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - name: http
      port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "patchmon.server.selectorLabels" . | nindent 4 }}
{{- end }}
