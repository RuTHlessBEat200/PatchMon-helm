{{- if .Values.server.enabled -}}
{{- $databaseHost := .Values.database.host | default (include "patchmon.database.fqdn" .) }}
{{- $databasePort := .Values.database.port | default .Values.database.service.port }}
{{- $redisHost := .Values.server.env.redisHost | default (include "patchmon.redis.fqdn" .) }}
{{- $redisPort := .Values.server.env.redisPort | default .Values.redis.service.port }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "patchmon.fullname" . }}-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "patchmon.server.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  serviceName: {{ include "patchmon.fullname" . }}-server
  {{- if not .Values.server.autoscaling.enabled }}
  replicas: {{ .Values.server.replicaCount }}
  {{- end }}
  {{- if .Values.server.updateStrategy }}
  updateStrategy:
    {{- toYaml .Values.server.updateStrategy | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "patchmon.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "patchmon.server.selectorLabels" . | nindent 8 }}
      {{- with .Values.server.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if and .Values.server.initContainers.waitForDatabase.enabled .Values.database.enabled }}
        - name: wait-for-database
          image: {{ include "patchmon.initContainer.image" . }}
          command:
            - sh
            - "-c"
            - "until nc -z {{ $databaseHost }} {{ $databasePort }}; do echo waiting for database; sleep 2; done"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 65534
        {{- end }}
        {{- if and .Values.server.initContainers.waitForRedis.enabled .Values.redis.enabled }}
        - name: wait-for-redis
          image: {{ include "patchmon.initContainer.image" . }}
          command:
            - sh
            - "-c"
            - "until nc -z {{ $redisHost }} {{ $redisPort }}; do echo waiting for redis; sleep 2; done"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 65534
        {{- end }}
        {{- if and .Values.server.initContainers.waitForGuacd.enabled .Values.guacd.enabled }}
        {{- $guacdHost := include "patchmon.guacd.fqdn" . }}
        - name: wait-for-guacd
          image: {{ include "patchmon.initContainer.image" . }}
          command:
            - sh
            - "-c"
            - "until nc -z {{ $guacdHost }} {{ .Values.guacd.service.port }}; do echo waiting for guacd; sleep 2; done"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 65534
        {{- end }}
      containers:
        - name: server
          image: {{ include "patchmon.server.image" . }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          env:
            - name: ENABLE_LOGGING
              value: {{ .Values.server.env.enableLogging | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.server.env.logLevel | quote }}
            - name: PM_LOG_TO_CONSOLE
              value: {{ .Values.server.env.logToConsole | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "patchmon.database.secretName" . }}
                  key: {{ .Values.database.auth.existingSecretPasswordKey }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.database.auth.username }}:$(POSTGRES_PASSWORD)@{{ $databaseHost }}:{{ $databasePort }}/{{ .Values.database.auth.database }}"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "patchmon.server.secretName" . }}
                  key: {{ .Values.server.existingSecretJwtKey }}
            - name: SERVER_PROTOCOL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "patchmon.configMapName" . }}
                  key: SERVER_PROTOCOL
            - name: SERVER_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "patchmon.configMapName" . }}
                  key: SERVER_HOST
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "patchmon.configMapName" . }}
                  key: SERVER_PORT
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: {{ include "patchmon.configMapName" . }}
                  key: CORS_ORIGIN
            - name: DB_CONNECTION_LIMIT
              value: {{ .Values.server.env.dbConnectionLimit | quote }}
            - name: DB_POOL_TIMEOUT
              value: {{ .Values.server.env.dbPoolTimeout | quote }}
            - name: DB_CONNECT_TIMEOUT
              value: {{ .Values.server.env.dbConnectTimeout | quote }}
            - name: DB_IDLE_TIMEOUT
              value: {{ .Values.server.env.dbIdleTimeout | quote }}
            - name: DB_MAX_LIFETIME
              value: {{ .Values.server.env.dbMaxLifetime | quote }}
            - name: RATE_LIMIT_WINDOW_MS
              value: {{ .Values.server.env.rateLimitWindowMs | quote }}
            - name: RATE_LIMIT_MAX
              value: {{ .Values.server.env.rateLimitMax | quote }}
            - name: AUTH_RATE_LIMIT_WINDOW_MS
              value: {{ .Values.server.env.authRateLimitWindowMs | quote }}
            - name: AUTH_RATE_LIMIT_MAX
              value: {{ .Values.server.env.authRateLimitMax | quote }}
            - name: AGENT_RATE_LIMIT_WINDOW_MS
              value: {{ .Values.server.env.agentRateLimitWindowMs | quote }}
            - name: AGENT_RATE_LIMIT_MAX
              value: {{ .Values.server.env.agentRateLimitMax | quote }}
            - name: REDIS_HOST
              value: {{ $redisHost | quote }}
            - name: REDIS_PORT
              value: {{ $redisPort | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "patchmon.redis.secretName" . }}
                  key: {{ .Values.redis.auth.existingSecretPasswordKey }}
            - name: REDIS_DB
              value: {{ .Values.server.env.redisDb | quote }}
            - name: TRUST_PROXY
              value: {{ .Values.server.env.trustProxy | quote }}
            - name: ENABLE_HSTS
              value: {{ .Values.server.env.enableHsts | quote }}
            - name: DEFAULT_USER_ROLE
              value: {{ .Values.server.env.defaultUserRole | quote }}
            - name: AUTO_CREATE_ROLE_PERMISSIONS
              value: {{ .Values.server.env.autoCreateRolePermissions | quote }}
            - name: AI_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "patchmon.server.secretName" . }}
                  key: {{ .Values.server.existingSecretAiEncryptionKey }}
            - name: FRONTEND_URL
              value: {{ include "patchmon.oidc.postLogoutUri" . | quote }}
            {{- if .Values.server.oidc.enabled }}
            - name: OIDC_ENABLED
              value: {{ .Values.server.oidc.enabled | quote }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.server.oidc.issuerUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.server.oidc.clientId | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "patchmon.server.secretName" . }}
                  key: {{ .Values.server.oidc.existingSecretClientSecretKey }}
            - name: OIDC_REDIRECT_URI
              value: {{ include "patchmon.oidc.redirectUri" . | quote }}
            - name: OIDC_POST_LOGOUT_URI
              value: {{ include "patchmon.oidc.postLogoutUri" . | quote }}
            - name: OIDC_SCOPES
              value: {{ .Values.server.oidc.scopes | quote }}
            - name: OIDC_BUTTON_TEXT
              value: {{ .Values.server.oidc.buttonText | quote }}
            - name: OIDC_AUTO_CREATE_USERS
              value: {{ .Values.server.oidc.autoCreateUsers | quote }}
            - name: OIDC_DEFAULT_ROLE
              value: {{ .Values.server.oidc.defaultRole | quote }}
            - name: OIDC_SYNC_ROLES
              value: {{ .Values.server.oidc.syncRoles | quote }}
            - name: OIDC_DISABLE_LOCAL_AUTH
              value: {{ .Values.server.oidc.disableLocalAuth | quote }}
            - name: OIDC_SESSION_TTL
              value: {{ .Values.server.oidc.sessionTtl | quote }}
            {{- if .Values.server.oidc.groups.superadmin }}
            - name: OIDC_SUPERADMIN_GROUP
              value: {{ .Values.server.oidc.groups.superadmin | quote }}
            {{- end }}
            {{- if .Values.server.oidc.groups.admin }}
            - name: OIDC_ADMIN_GROUP
              value: {{ .Values.server.oidc.groups.admin | quote }}
            {{- end }}
            {{- if .Values.server.oidc.groups.hostManager }}
            - name: OIDC_HOST_MANAGER_GROUP
              value: {{ .Values.server.oidc.groups.hostManager | quote }}
            {{- end }}
            {{- if .Values.server.oidc.groups.user }}
            - name: OIDC_USER_GROUP
              value: {{ .Values.server.oidc.groups.user | quote }}
            {{- end }}
            {{- if .Values.server.oidc.groups.readonly }}
            - name: OIDC_READONLY_GROUP
              value: {{ .Values.server.oidc.groups.readonly | quote }}
            {{- end }}
            {{- end }}
            {{- range .Values.server.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.server.service.port }}
              protocol: TCP
          {{- if .Values.server.livenessProbe.enabled }}
          livenessProbe:
            {{- if .Values.server.livenessProbe.tcpSocket }}
            tcpSocket:
              port: {{ .Values.server.livenessProbe.tcpSocket.port }}
            {{- else }}
            httpGet:
              path: {{ .Values.server.livenessProbe.httpGet.path }}
              port: {{ .Values.server.livenessProbe.httpGet.port }}
              {{- with .Values.server.livenessProbe.httpGet.httpHeaders }}
              httpHeaders:
                {{- toYaml . | nindent 16 }}
              {{- end }}
            {{- end }}
            initialDelaySeconds: {{ .Values.server.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.server.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.server.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.server.readinessProbe.enabled }}
          readinessProbe:
            {{- if .Values.server.readinessProbe.tcpSocket }}
            tcpSocket:
              port: {{ .Values.server.readinessProbe.tcpSocket.port }}
            {{- else }}
            httpGet:
              path: {{ .Values.server.readinessProbe.httpGet.path }}
              port: {{ .Values.server.readinessProbe.httpGet.port }}
              {{- with .Values.server.readinessProbe.httpGet.httpHeaders }}
              httpHeaders:
                {{- toYaml . | nindent 16 }}
              {{- end }}
            {{- end }}
            initialDelaySeconds: {{ .Values.server.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.server.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.server.readinessProbe.failureThreshold }}
          {{- end }}
          {{- with .Values.server.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.server.extraVolumeMounts }}
          volumeMounts:
            {{- range .Values.server.extraVolumeMounts }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
              {{- if hasKey . "readOnly" }}
              readOnly: {{ .readOnly }}
              {{- else }}
              readOnly: true
              {{- end }}
            {{- end }}
          {{- end }}
      {{- if .Values.server.extraVolumes }}
      volumes:
        {{- range .Values.server.extraVolumes }}
        - name: {{ .name }}
          {{- if .configMap }}
          configMap:
            name: {{ .configMap.name }}
          {{- end }}
          {{- if .secret }}
          secret:
            secretName: {{ .secret.secretName }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
