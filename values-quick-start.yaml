global:
  storageClass: "proxmox-data"

fullnameOverride: "patchmon-dev"

server:
  env:
    serverProtocol: https
    serverHost: patchmon-dev.example.com
    serverPort: "443"
    corsOrigin: https://patchmon-dev.example.com
  jwtSecret: "quick-start-jwt-secret"
  aiEncryptionKey: "quick-start-ai-encryption-key"
  oidc:
    enabled: false
    clientSecret: "quick-start-oidc-client-secret"

database:
  auth:
    password: "quick-start-db-password"

redis:
  auth:
    password: "quick-start-redis-password"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/client-body-buffer-size: "4m"
    nginx.ingress.kubernetes.io/websocket-services: "server"
  hosts:
    - host: patchmon-dev.example.com
      paths:
        - path: /
          pathType: Prefix
          service:
            name: server
            port: 3000
  tls:
    - secretName: patchmon-dev-tls
      hosts:
        - patchmon-dev.example.com
